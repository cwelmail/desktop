<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    background: transparent;
    color: var(--fg);
    font-size: 13px;
    line-height: 1.35;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    overflow: hidden;
  }

  :root {
    --fg: #1d1d1f;
    --muted: #86868b;
    --dim: #aeaeb2;
    --bg: rgba(255,255,255,0.95);
    --border: rgba(0,0,0,0.1);
    --sep: rgba(0,0,0,0.1);
    --hover: rgba(0,0,0,0.04);
    --badge-bg: rgba(0,0,0,0.06);
    --badge-fg: #86868b;
    --dot: #34c759;
    --dot-away: #ff9f0a;
    --accent: #007aff;
  }

  .panel {
    width: 300px;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    overflow: hidden;
  }

  .scroll {
    max-height: 400px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  .section { padding: 5px 0; }
  .section + .section { border-top: 0.5px solid var(--sep); }

  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    cursor: default;
    transition: background 0.08s;
  }
  .item.clickable { cursor: pointer; }
  .item.clickable:hover { background: var(--hover); }

  .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
    color: #fff;
  }

  .text { flex: 1; min-width: 0; }
  .primary { font-size: 13px; font-weight: 400; }
  .muted { font-size: 12px; color: var(--muted); }
  .dim { font-size: 11px; color: var(--dim); }

  .truncate {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .right {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    min-width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 9px;
    padding: 0 5px;
    font-variant-numeric: tabular-nums;
    background: var(--badge-bg);
    color: var(--badge-fg);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--dot);
  }
  .dot.away { background: var(--dot-away); }

  .status-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
  }

  .label {
    padding: 8px 12px 3px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--dim);
  }

  .row-separator {
    height: 0.5px;
    margin: 0 12px;
    background: var(--sep);
  }

  .actions {
    display: flex;
    padding: 5px 8px;
    gap: 1px;
  }
  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 6px 0;
    border: none;
    background: none;
    font-size: 12px;
    font-weight: 400;
    font-family: inherit;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.08s;
    color: var(--accent);
  }
  .action-btn:hover { background: var(--hover); }
  .action-btn:active { opacity: 0.6; }
  .action-btn svg { width: 14px; height: 14px; }
  .action-btn.quit { color: var(--fg); opacity: 0.4; }

  .empty {
    padding: 16px 12px;
    text-align: center;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="panel" id="panel"></div>

<script>
const isDark = window.matchMedia("(prefers-color-scheme: dark)");
function applyTheme() {
  const d = isDark.matches;
  const r = document.documentElement.style;
  if (d) {
    r.setProperty("--fg", "#f5f5f7");
    r.setProperty("--muted", "#98989d");
    r.setProperty("--dim", "#636366");
    r.setProperty("--bg", "rgba(30,30,30,0.95)");
    r.setProperty("--border", "rgba(255,255,255,0.12)");
    r.setProperty("--sep", "rgba(255,255,255,0.12)");
    r.setProperty("--hover", "rgba(255,255,255,0.06)");
    r.setProperty("--badge-bg", "rgba(255,255,255,0.08)");
    r.setProperty("--badge-fg", "#98989d");
    r.setProperty("--dot", "#30d158");
    r.setProperty("--dot-away", "#ffd60a");
    r.setProperty("--accent", "#0a84ff");
  } else {
    r.setProperty("--fg", "#1d1d1f");
    r.setProperty("--muted", "#86868b");
    r.setProperty("--dim", "#aeaeb2");
    r.setProperty("--bg", "rgba(255,255,255,0.95)");
    r.setProperty("--border", "rgba(0,0,0,0.12)");
    r.setProperty("--sep", "rgba(0,0,0,0.12)");
    r.setProperty("--hover", "rgba(0,0,0,0.04)");
    r.setProperty("--badge-bg", "rgba(0,0,0,0.06)");
    r.setProperty("--badge-fg", "#86868b");
    r.setProperty("--dot", "#34c759");
    r.setProperty("--dot-away", "#ff9f0a");
    r.setProperty("--accent", "#007aff");
  }
}
applyTheme();
isDark.addEventListener("change", applyTheme);

const COLORS = ["#ff3b30","#ff9500","#ffcc00","#34c759","#00c7be","#30b0c7","#007aff","#5856d6","#af52de","#ff2d55","#a2845e","#8e8e93"];
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h);}
function color(s){return COLORS[hash(s)%COLORS.length];}
function initials(from,name){
  const n=name||from?.split("@")[0]||"?";
  const p=n.replace(/[._-]/g," ").trim().split(/\s+/);
  return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase();
}
function timeAgo(ts){
  if(!ts)return"";const d=Date.now()-new Date(ts).getTime();
  if(isNaN(d))return"";if(d<60000)return"now";if(d<3600000)return Math.floor(d/60000)+"m";
  if(d<86400000)return Math.floor(d/3600000)+"h";return Math.floor(d/86400000)+"d";
}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}

let state={totalUnread:0,recentMessages:[],accountEmail:"",plan:"",connected:true,reconnecting:false};

function render(){
  const s=state,panel=document.getElementById("panel");
  let h="";

  const connected=!s.reconnecting&&s.connected;
  h+=`<div class="section">
    <div class="status-row">
      <span class="dot${connected?"":" away"}"></span>
      <span class="primary">${esc(s.accountEmail||"Not signed in")}</span>
      <span class="right"><span class="badge">${s.totalUnread||""}</span></span>
    </div>
  </div>`;

  if(s.recentMessages.length>0){
    h+=`<div class="section"><div class="label">Messages</div>`;
    for(let i=0;i<s.recentMessages.length;i++){
      const m=s.recentMessages[i];
      const c=color(m.from||"");
      const ini=initials(m.from,m.senderName);
      const name=m.senderName||m.from?.split("@")[0]||m.from||"";
      h+=`<div class="item clickable" data-action="open-message" data-id="${esc(m.id||"")}" data-alias="${esc(m.alias||"")}">
        <div class="avatar" style="background:${c}">${esc(ini)}</div>
        <div class="text"><div class="primary truncate" style="${m.unread?"font-weight:600":""}">${esc(name)}</div><div class="muted truncate">${esc(m.subject)}</div></div>
        <div class="right"><span class="dim">${timeAgo(m.receivedAt)}</span></div>
      </div>`;
      if(i<s.recentMessages.length-1)h+=`<div class="row-separator"></div>`;
    }
    h+=`</div>`;
  }

  if(s.recentMessages.length===0){
    h+=`<div class="section"><div class="empty">${s.totalUnread>0?"No recent messages":"No messages"}</div></div>`;
  }

  h+=`<div class="section">
    <div class="actions">
      <button class="action-btn" data-action="compose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Compose
      </button>
      <button class="action-btn" data-action="open-inbox">Inbox</button>
      <button class="action-btn quit" data-action="quit">Quit</button>
    </div>
  </div>`;

  panel.innerHTML=h;
  panel.querySelectorAll("[data-action]").forEach(el=>{
    el.addEventListener("click",()=>{
      const a=el.dataset.action;
      if(a==="compose")electronAPI.composeFromTray();
      else if(a==="open-message")electronAPI.openMessageFromTray({ id: el.dataset.id, alias: el.dataset.alias || undefined });
      else if(a==="open-inbox")electronAPI.openInboxFromTray();
      else if(a==="quit")electronAPI.quitFromTray();
    });
  });
}

electronAPI.onTrayState((s)=>{state={...state,...s};render();});
render();
</script>
</body>
</html>
